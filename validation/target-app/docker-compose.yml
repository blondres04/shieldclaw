services:
  postgres:
    image: postgres:16-alpine
    container_name: target-app-postgres
    environment:
      POSTGRES_USER: targetapp
      POSTGRES_PASSWORD: targetapp
      POSTGRES_DB: targetapp
    ports:
      - "5433:5432"
    volumes:
      - targetapp_pgdata:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U targetapp -d targetapp"]
      interval: 2s
      timeout: 5s
      retries: 15

  app:
    build: .
    container_name: target-app-api
    ports:
      - "3000:3000"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: targetapp
      PGPASSWORD: targetapp
      PGDATABASE: targetapp
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  targetapp_pgdata:
