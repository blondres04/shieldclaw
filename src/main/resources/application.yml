server:
  port: 8080

payload:
  directory: ${PAYLOAD_DIRECTORY:src/main/resources/offline-payloads}

spring:
  application:
    name: shield-claw

  datasource:
    url: jdbc:postgresql://localhost:5432/shieldclaw_db
    username: shieldclaw
    password: shieldclaw
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: shieldclaw-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.shieldclaw.audit"
