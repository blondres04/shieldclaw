services:
  postgres:
    image: postgres:16
    container_name: shieldclaw-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shieldclaw
      POSTGRES_PASSWORD: shieldclaw
      POSTGRES_DB: shieldclaw_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:3.8.0
    container_name: shieldclaw-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shieldclaw-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shieldclaw_db
      SPRING_DATASOURCE_USERNAME: shieldclaw
      SPRING_DATASOURCE_PASSWORD: shieldclaw
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      PAYLOAD_DIRECTORY: /app/payloads
    volumes:
      - shared-payloads:/app/payloads
    depends_on:
      - postgres
      - kafka

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shieldclaw-frontend
    ports:
      - "5173:80"

  red-team-agent:
    build:
      context: ./red-team-agent
      dockerfile: Dockerfile
    container_name: shieldclaw-red-team
    env_file:
      - ./red-team-agent/.env
    environment:
      PAYLOAD_DIR: /app/payloads
      OLLAMA_HOST: http://host.docker.internal:11434
      PYTHONUNBUFFERED: 1
    volumes:
      - shared-payloads:/app/payloads
      - //var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
  shared-payloads:
